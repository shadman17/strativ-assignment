services:
  web:
    build: .
    container_name: weather_web
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8005"
    volumes:
      - .:/code
    ports:
      - "8005:8005"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    container_name: weather_celery_worker
    command: celery -A project_weatherforecast worker --loglevel=info
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    container_name: weather_celery_beat
    command: celery -A project_weatherforecast beat --loglevel=info
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - db
      - redis

  flower:
    build: .
    container_name: weather_celery_flower
    command: celery -A project_weatherforecast flower -l --loglevel=info
    ports:
      - "5555:5555"    
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - celery_worker
      - redis

  db:
    image: postgres:16
    container_name: weather_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: weather_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: